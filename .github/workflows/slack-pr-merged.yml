name: Slack notification on PR merge

on:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  notify-slack:
    # Only run when the PR was actually merged, not just closed
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Build Slack payload
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_AUTHOR: ${{ github.event.pull_request.merged_by.login }}
        run: |
          python3 - <<'EOF'
          import json, os

          body = os.environ.get('PR_BODY', '').strip() or '_No details provided._'
          author = os.environ['PR_AUTHOR']

          # Truncate to Slack's 3000-char section limit
          if len(body) > 2900:
              body = body[:2900] + '\n_... (truncated)_'

          payload = {
              'text': f'The course repository was just updated by {author}.',
              'blocks': [
                  {
                      'type': 'section',
                      'text': {
                          'type': 'mrkdwn',
                          'text': f':books: *The course repository was just updated by {author}.*'
                      }
                  },
                  {
                      'type': 'section',
                      'text': {
                          'type': 'mrkdwn',
                          'text': body
                      }
                  }
              ]
          }

          with open('slack_payload.json', 'w') as f:
              json.dump(payload, f)
          EOF

      - name: Send Slack notification
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload-file-path: slack_payload.json
