name: Slack notification on PR merge

on:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  notify-slack:
    # Only run when the PR was actually merged, not just closed
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Build Slack payload
        env:
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_URL: ${{ github.event.pull_request.html_url }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_AUTHOR: ${{ github.event.pull_request.merged_by.login }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO_NAME: ${{ github.repository }}
        run: |
          python3 - <<'EOF'
          import json, os

          title = os.environ['PR_TITLE']
          url = os.environ['PR_URL']
          body = os.environ.get('PR_BODY', '').strip() or '_No description provided._'
          author = os.environ['PR_AUTHOR']
          number = os.environ['PR_NUMBER']
          repo = os.environ['REPO_NAME']

          # Truncate to Slack's 3000-char section limit
          if len(body) > 2900:
              body = body[:2900] + '\n_... (truncated)_'

          payload = {
              'text': f'PR #{number} merged to main in {repo}: {title}',
              'blocks': [
                  {
                      'type': 'header',
                      'text': {
                          'type': 'plain_text',
                          'text': ':merged: PR merged to main',
                          'emoji': True
                      }
                  },
                  {
                      'type': 'section',
                      'text': {
                          'type': 'mrkdwn',
                          'text': f'*<{url}|#{number}: {title}>*\nMerged by *{author}* in `{repo}`'
                      }
                  },
                  {
                      'type': 'section',
                      'text': {
                          'type': 'mrkdwn',
                          'text': body
                      }
                  },
                  {
                      'type': 'divider'
                  }
              ]
          }

          with open('slack_payload.json', 'w') as f:
              json.dump(payload, f)
          EOF

      - name: Send Slack notification
        uses: slackapi/slack-github-action@v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload-file-path: slack_payload.json
