name: Slack notifications

on:
  workflow_run:
    workflows: ["pages-build-deployment"]
    types: [completed]

jobs:
  notify-slack:
    # workflow_run conclusion == 'success' means pages-build-deployment finished
    # successfully, so the site is already live - no polling needed
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read

    steps:
      - name: Notify Slack
        env:
          GH_TOKEN: ${{ github.token }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'EOF'
          import json, os, re, sys, urllib.request, urllib.error

          token = os.environ['GH_TOKEN']
          repo = os.environ['REPO']
          webhook_url = os.environ['SLACK_WEBHOOK_URL']

          api_headers = {
              'Authorization': f'Bearer {token}',
              'Accept': 'application/vnd.github+json',
              'X-GitHub-Api-Version': '2022-11-28'
          }

          def gh_get(path):
              req = urllib.request.Request(
                  f'https://api.github.com{path}', headers=api_headers
              )
              try:
                  with urllib.request.urlopen(req) as resp:
                      return json.loads(resp.read())
              except urllib.error.HTTPError as e:
                  print(f'GitHub API error for {path}: {e}')
                  return None

          # pages-build-deployment runs against gh-pages, not main.
          # Fetch the HEAD of main to find the PR that triggered this deployment.
          main_head = gh_get(f'/repos/{repo}/commits/main')
          if main_head is None:
              print('Could not fetch main branch HEAD - exiting.')
              sys.exit(0)

          sha = main_head['sha']
          commit_message = main_head.get('commit', {}).get('message', '')
          print(f'Main HEAD SHA: {sha}')
          print(f'Commit message: {commit_message[:120]}')

          pr_body = None
          pr_author = None
          pr_number = None
          pr_title = None
          pr_url = None

          # Strategy 1: standard merge commit - message contains "Merge pull request #N"
          match = re.search(r'Merge pull request #(\d+)', commit_message)
          if match:
              pr_number = int(match.group(1))
              print(f'Found PR #{pr_number} from commit message.')
              pr = gh_get(f'/repos/{repo}/pulls/{pr_number}')
              if pr:
                  pr_body = (pr.get('body') or '').strip()
                  pr_title = pr.get('title', '')
                  pr_url = pr.get('html_url', '')
                  pr_author = (
                      (pr.get('merged_by') or {}).get('login')
                      or pr['user']['login']
                  )
          else:
              # Strategy 2: squash/rebase merge - query the commits API
              print('No standard merge commit - querying commits API.')
              prs = gh_get(f'/repos/{repo}/commits/{sha}/pulls') or []
              merged = [p for p in prs if p.get('merged_at')]
              if merged:
                  pr = merged[0]
                  pr_number = pr.get('number')
                  pr_body = (pr.get('body') or '').strip()
                  pr_title = pr.get('title', '')
                  pr_url = pr.get('html_url', '')
                  pr_author = (
                      (pr.get('merged_by') or {}).get('login')
                      or pr['user']['login']
                  )

          if pr_author is None:
              print('No merged PR found for this commit - skipping Slack notification.')
              sys.exit(0)

          body = pr_body or '_No details provided._'
          author = pr_author

          # Truncate so the details field stays readable in Slack
          if len(body) > 2900:
              body = body[:2900] + '\n... (truncated)'

          site_url = 'https://gperdrizet.github.io/fullstack-2605/'

          # Workflow Builder webhooks expect simple key-value variables,
          # not Block Kit JSON. The variable names must match what you
          # defined when creating the webhook trigger in Workflow Builder.
          payload = {
              'author': author,
              'details': body,
              'site_url': site_url,
              'pr_number': str(pr_number) if pr_number else '',
              'pr_title': pr_title or '',
              'pr_url': pr_url or ''
          }

          data = json.dumps(payload).encode()
          req = urllib.request.Request(
              webhook_url,
              data=data,
              headers={'Content-Type': 'application/json'},
              method='POST'
          )
          with urllib.request.urlopen(req) as resp:
              print(f'Slack webhook response: {resp.status}')
          EOF

