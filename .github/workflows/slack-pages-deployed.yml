name: Slack notifications

on:
  workflow_run:
    workflows: ["Pages deployment"]
    types: [completed]

jobs:
  notify-slack:
    # Only run after a successful publish, not a failed one
    if: github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
      deployments: read

    steps:
      - name: Notify Slack
        env:
          GH_TOKEN: ${{ github.token }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          REPO: ${{ github.repository }}
        run: |
          python3 - <<'EOF'
          import json, os, re, sys, urllib.request, urllib.error

          token = os.environ['GH_TOKEN']
          sha = os.environ['HEAD_SHA']
          repo = os.environ['REPO']
          webhook_url = os.environ['SLACK_WEBHOOK_URL']

          api_headers = {
              'Authorization': f'Bearer {token}',
              'Accept': 'application/vnd.github+json',
              'X-GitHub-Api-Version': '2022-11-28'
          }

          def gh_get(path):
              req = urllib.request.Request(
                  f'https://api.github.com{path}', headers=api_headers
              )
              try:
                  with urllib.request.urlopen(req) as resp:
                      return json.loads(resp.read())
              except urllib.error.HTTPError as e:
                  print(f'GitHub API error for {path}: {e}')
                  return None

          # Fetch the commit to read its message
          commit = gh_get(f'/repos/{repo}/commits/{sha}')
          if commit is None:
              print('Could not fetch commit - exiting.')
              sys.exit(0)

          commit_message = commit.get('commit', {}).get('message', '')
          print(f'Commit message: {commit_message[:120]}')

          pr_body = None
          pr_author = None

          # Strategy 1: standard merge commit - message contains "Merge pull request #N"
          match = re.search(r'Merge pull request #(\d+)', commit_message)
          if match:
              pr_number = int(match.group(1))
              print(f'Found PR #{pr_number} from commit message.')
              pr = gh_get(f'/repos/{repo}/pulls/{pr_number}')
              if pr:
                  pr_body = (pr.get('body') or '').strip()
                  pr_author = (
                      (pr.get('merged_by') or {}).get('login')
                      or pr['user']['login']
                  )
          else:
              # Strategy 2: squash/rebase merge - query the commits API
              print('No standard merge commit - querying commits API.')
              prs = gh_get(f'/repos/{repo}/commits/{sha}/pulls') or []
              # A merged PR will have state=closed and a non-null merged_at
              merged = [p for p in prs if p.get('merged_at')]
              if merged:
                  pr = merged[0]
                  pr_body = (pr.get('body') or '').strip()
                  pr_author = (
                      (pr.get('merged_by') or {}).get('login')
                      or pr['user']['login']
                  )

          if pr_author is None:
              print('No merged PR found for this commit - skipping Slack notification.')
              sys.exit(0)

          body = pr_body or '_No details provided._'
          author = pr_author

          # Poll until the GitHub Pages deployment is live before notifying
          import time

          print('Waiting for GitHub Pages deployment to go live...')

          # Snapshot the current latest deployment so we can detect when a new one starts
          initial = gh_get(
              f'/repos/{repo}/deployments?environment=github-pages&per_page=1'
          ) or []
          latest_known_id = initial[0]['id'] if initial else None
          print(f'Latest known deployment ID: {latest_known_id}')

          max_attempts = 40  # 40 × 15 s = 10 minutes max
          for attempt in range(max_attempts):
              deployments = gh_get(
                  f'/repos/{repo}/deployments?environment=github-pages&per_page=1'
              )
              if deployments:
                  deployment_id = deployments[0]['id']

                  if deployment_id == latest_known_id:
                      print(f'  Attempt {attempt + 1}: waiting for new deployment to start...')
                  else:
                      statuses = gh_get(
                          f'/repos/{repo}/deployments/{deployment_id}/statuses'
                      )
                      state = (statuses or [{}])[0].get('state', 'unknown')
                      print(f'  Attempt {attempt + 1}: deployment {deployment_id} state = {state}')
                      if state == 'success':
                          break
                      if state in ('failure', 'error'):
                          print('Pages deployment failed - skipping Slack notification.')
                          sys.exit(0)
              else:
                  print(f'  Attempt {attempt + 1}: no deployments found yet...')

              if attempt < max_attempts - 1:
                  time.sleep(15)
          else:
              print('Timed out waiting for Pages deployment - skipping Slack notification.')
              sys.exit(0)

          # Truncate to Slack's 3000-char section limit
          if len(body) > 2900:
              body = body[:2900] + '\n_... (truncated)_'

          site_url = 'https://gperdrizet.github.io/fullstack-2605/'

          payload = {
              'text': f'The course materials site was just updated by {author}.',
              'blocks': [
                  {
                      'type': 'section',
                      'text': {
                          'type': 'mrkdwn',
                          'text': f'*The <{site_url}|course materials site> was just updated by {author}.*'
                      }
                  },
                  {
                      'type': 'section',
                      'text': {'type': 'mrkdwn', 'text': body}
                  }
              ]
          }

          data = json.dumps(payload).encode()
          req = urllib.request.Request(
              webhook_url,
              data=data,
              headers={'Content-Type': 'application/json'},
              method='POST'
          )
          with urllib.request.urlopen(req) as resp:
              print(f'Slack webhook response: {resp.status}')
          EOF

