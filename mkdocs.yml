site_name: Fullstack Academy AI/ML cohort 2605
site_url: https://gperdrizet.github.io/fullstack-2605/
repo_url: https://github.com/gperdrizet/fullstack-2605
repo_name: gperdrizet/fullstack-2605

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/download.js

markdown_extensions:
  - attr_list
  - pymdownx.snippets:
      base_path: [docs]

theme:
  name: material
  logo: assets/logo.png
  favicon: assets/logo.png
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
  palette:
    primary: custom
    accent: custom

nav:
  - Home: index.md
  - Notebooks: notebooks.md
  - Datasets: datasets.md
  - Resources:
    - Documentation links: resources/documentation-links.md
    - Linux commands: resources/linux-commands.md
    - Notebook shortcuts: resources/notebook-shortcuts.md
    - Dev tools install guide: resources/dev-tools-install-guide.md
    - Dev container setup guide: resources/dev-container-guide.md
